[PHP]
; General
memory_limit = 256M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000

; Error handling
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php.log

; File uploads
file_uploads = On
upload_tmp_dir = /tmp

; Date
date.timezone = UTC

; Session
session.gc_probability = 1
session.gc_divisor = 1000
session.gc_maxlifetime = 1440
session.save_path = /var/www/html/storage/framework/sessions

; OPcache (handled in opcache.ini)
